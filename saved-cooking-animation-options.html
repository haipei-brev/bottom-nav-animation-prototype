<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bottom Nav Animation Variants</title>

  <style>
    /*
      This page uses only HTML, CSS, and JavaScript.
      Each nav is a separate animation idea.
    */

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #211f1d;
      background: #f7f2ea;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .variant-board {
      width: min(420px, 100%);
      display: flex;
      flex-direction: column;
      gap: 28px;
      align-items: center;
    }

    .variant {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .variant-title {
      margin: 0;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0;
      color: #6a625b;
    }

    .bottom-nav-wrap {
      width: 100%;
      height: 95px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 10px;
      pointer-events: none;
    }

    .bottom-nav {
      width: min(360px, 100%);
      height: 60px;
      border: 0;
      border-radius: 999px;
      padding: 0;
      background: transparent;
      cursor: pointer;
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 0;
      filter: drop-shadow(0 22px 24px rgba(66, 62, 58, 0.28));
      -webkit-tap-highlight-color: transparent;
    }

    .bottom-nav:focus {
      outline: none;
    }

    .cook-button {
      width: 0;
      max-width: 0;
      height: 60px;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 0;
      position: relative;
      overflow: visible;
      transition:
        width 420ms cubic-bezier(0.2, 0.8, 0.2, 1),
        max-width 420ms cubic-bezier(0.2, 0.8, 0.2, 1),
        flex-basis 420ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .cook-button-inner {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(145deg, #ff774c, #ff4e37);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0;
      transform-origin: center;
      transition:
        opacity 220ms ease,
        transform 420ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .variant-pop .cook-button-inner {
      opacity: 0;
      transform: scale(0);
      transition:
        opacity 180ms ease-out,
        transform 180ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .variant-bottom .cook-button-inner {
      transform: translateY(72px) scale(0.88);
    }

    .variant-left .cook-button-inner {
      transform: translateX(-76px) scale(0.88);
    }

    .cook-icon {
      width: 28px;
      height: 28px;
      display: block;
    }

    .nav-main {
      width: 100%;
      height: 60px;
      border-radius: 999px;
      padding: 3.5px 4px;
      display: flex;
      align-items: center;
      flex: 1 1 auto;
      min-width: 0;
      background: linear-gradient(180deg, #ececea 0%, #d6d6d4 100%);
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.85),
        inset 0 -1px 2px rgba(58, 56, 53, 0.1);
      overflow: hidden;
      transition: width 420ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .nav-tab {
      height: 52px;
      border-radius: 999px;
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: #4f4f4d;
      transition:
        flex-basis 420ms cubic-bezier(0.2, 0.8, 0.2, 1),
        background-color 260ms ease,
        color 260ms ease;
    }

    .nav-tab.is-selected {
      color: #161616;
      background: rgba(196, 196, 194, 0.56);
    }

    .nav-icon {
      width: 23px;
      height: 23px;
      display: block;
      flex: 0 0 auto;
    }

    .nav-label {
      font-size: 11px;
      font-weight: bold;
      line-height: 1;
      white-space: nowrap;
    }

    .bottom-nav.is-cooking {
      gap: 8px;
    }

    .bottom-nav.is-cooking .cook-button {
      width: 60px;
      max-width: 60px;
      flex-basis: 60px;
    }

    .bottom-nav.is-cooking .cook-button-inner {
      opacity: 1;
      transform: translateX(0) translateY(0) scale(1);
    }

    .variant-pop.is-cooking .cook-button-inner {
      opacity: 1;
      transform: scale(1);
    }

    .bottom-nav.is-cooking .nav-main {
      width: calc(100% - 68px);
    }

    .bottom-nav.is-cooking .nav-tab {
      flex-basis: 94.66px;
    }
  </style>
</head>
<body>

  </svg>

  <main class="variant-board" aria-label="Bottom nav animation variants">
    <section class="variant">
      <p class="variant-title">option 1 (preferred): scaling up</p>
      <div class="bottom-nav-wrap">
        <button class="bottom-nav variant-pop" type="button" aria-label="Open cooking mode for current variant" aria-pressed="false">
          <span class="cook-button" aria-hidden="true">
            <span class="cook-button-inner">
              <svg class="cook-icon" aria-hidden="true"><use href="#icon-cook"></use></svg>
            </span>
          </span>

          <span class="nav-main">
            <span class="nav-tab">
              <svg class="nav-icon" aria-hidden="true"><use href="#icon-appliance"></use></svg>
              <span class="nav-label">Appliance</span>
            </span>
            <span class="nav-tab is-selected">
              <svg class="nav-icon" aria-hidden="true"><use href="#icon-discover"></use></svg>
              <span class="nav-label">Discover</span>
            </span>
            <span class="nav-tab">
              <svg class="nav-icon" aria-hidden="true"><use href="#icon-you"></use></svg>
              <span class="nav-label">You</span>
            </span>
          </span>
        </button>
      </div>
    </section>

    <section class="variant">
      <p class="variant-title">option 2: active cook button slide in from bottom</p>
      <div class="bottom-nav-wrap">
        <button class="bottom-nav variant-bottom" type="button" aria-label="Open cooking mode for bottom slide variant" aria-pressed="false">
          <span class="cook-button" aria-hidden="true">
            <span class="cook-button-inner">
              <svg class="cook-icon" aria-hidden="true"><use href="#icon-cook"></use></svg>
            </span>
          </span>

          <span class="nav-main">
            <span class="nav-tab">
              <svg class="nav-icon" aria-hidden="true"><use href="#icon-appliance"></use></svg>
              <span class="nav-label">Appliance</span>
            </span>
            <span class="nav-tab is-selected">
              <svg class="nav-icon" aria-hidden="true"><use href="#icon-discover"></use></svg>
              <span class="nav-label">Discover</span>
            </span>
            <span class="nav-tab">
              <svg class="nav-icon" aria-hidden="true"><use href="#icon-you"></use></svg>
              <span class="nav-label">You</span>
            </span>
          </span>
        </button>
      </div>
    </section>

    <section class="variant">
      <p class="variant-title">option 3: active cook button slide in from left</p>
      <div class="bottom-nav-wrap">
        <button class="bottom-nav variant-left" type="button" aria-label="Open cooking mode for left slide variant" aria-pressed="false">
          <span class="cook-button" aria-hidden="true">
            <span class="cook-button-inner">
              <svg class="cook-icon" aria-hidden="true"><use href="#icon-cook"></use></svg>
            </span>
          </span>

          <span class="nav-main">
            <span class="nav-tab">
              <svg class="nav-icon" aria-hidden="true"><use href="#icon-appliance"></use></svg>
              <span class="nav-label">Appliance</span>
            </span>
            <span class="nav-tab is-selected">
              <svg class="nav-icon" aria-hidden="true"><use href="#icon-discover"></use></svg>
              <span class="nav-label">Discover</span>
            </span>
            <span class="nav-tab">
              <svg class="nav-icon" aria-hidden="true"><use href="#icon-you"></use></svg>
              <span class="nav-label">You</span>
            </span>
          </span>
        </button>
      </div>
    </section>
  </main>

  <script>
    /*
      This JavaScript finds every bottom nav on the page.
      Each nav can be clicked by itself to turn its own animation on or off.
    */

    var bottomNavs = document.querySelectorAll(".bottom-nav");

    for (var navIndex = 0; navIndex < bottomNavs.length; navIndex = navIndex + 1) {
      bottomNavs[navIndex].addEventListener("click", function () {
        var cookModeIsOn = this.classList.toggle("is-cooking");

        this.setAttribute("aria-pressed", cookModeIsOn);

        if (cookModeIsOn) {
          this.setAttribute("aria-label", "Close cooking mode");
        } else {
          this.setAttribute("aria-label", "Open cooking mode");
        }
      });
    }
  </script>

</body>
</html>
