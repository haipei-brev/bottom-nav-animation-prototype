<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cooking and Coffee Bottom Navs</title>

  <style>
    /*
      This page uses only HTML, CSS, and JavaScript.
      Click either bottom nav to turn its active button on or off.
    */

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #211f1d;
      background: #f7f2ea;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .nav-board {
      width: min(420px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 34px;
    }

    .nav-version {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .version-title {
      margin: 0;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0;
      color: #6a625b;
    }

    .bottom-nav-wrap {
      width: 100%;
      height: 95px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 10px;
      pointer-events: none;
    }

    .bottom-nav {
      width: min(360px, 100%);
      height: 60px;
      border: 0;
      border-radius: 999px;
      padding: 0;
      background: transparent;
      cursor: pointer;
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 0;
      filter: drop-shadow(0 22px 24px rgba(66, 62, 58, 0.28));
      -webkit-tap-highlight-color: transparent;
    }

    .bottom-nav:focus {
      outline: none;
    }

    .active-slot {
      width: 0;
      max-width: 0;
      height: 60px;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 0;
      position: relative;
      overflow: visible;
      transition:
        width 420ms cubic-bezier(0.2, 0.8, 0.2, 1),
        max-width 420ms cubic-bezier(0.2, 0.8, 0.2, 1),
        flex-basis 420ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .active-button {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      top: 0;
      opacity: 0;
      transform: scale(0);
      transform-origin: center;
      transition:
        opacity 180ms ease-out,
        transform 180ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .bottom-nav.is-active {
      gap: 8px;
    }

    .bottom-nav.is-active .active-slot {
      width: 60px;
      max-width: 60px;
      flex-basis: 60px;
    }

    .bottom-nav.is-active .active-button {
      opacity: 1;
      transform: scale(1);
    }

    .nav-main {
      width: 100%;
      height: 60px;
      border-radius: 999px;
      padding: 3.5px 4px;
      display: flex;
      align-items: center;
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      transition: width 420ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .bottom-nav.is-active .nav-main {
      width: calc(100% - 68px);
    }

    .nav-tab {
      height: 52px;
      border-radius: 999px;
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition:
        flex-basis 420ms cubic-bezier(0.2, 0.8, 0.2, 1),
        background-color 260ms ease,
        color 260ms ease;
    }

    .bottom-nav.is-active .nav-tab {
      flex-basis: 94.66px;
    }

    .nav-icon {
      width: 23px;
      height: 23px;
      display: block;
      flex: 0 0 auto;
    }

    .active-icon {
      width: 28px;
      height: 28px;
      display: block;
    }

    .nav-label {
      font-size: 11px;
      font-weight: bold;
      line-height: 1;
      white-space: nowrap;
    }

    .cooking-nav .active-button {
      left: 0;
      background: linear-gradient(145deg, #ff774c, #ff4e37);
    }

    .cooking-nav .nav-main {
      background: linear-gradient(180deg, #ececea 0%, #d6d6d4 100%);
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.85),
        inset 0 -1px 2px rgba(58, 56, 53, 0.1);
    }

    .cooking-nav .nav-tab {
      color: #4f4f4d;
    }

    .cooking-nav .nav-tab.is-selected {
      color: #161616;
      background: rgba(196, 196, 194, 0.56);
    }

    .coffee-stage {
      width: min(402px, 100%);
      height: 95px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 10px;
    }

    .coffee-nav {
      filter: drop-shadow(0 20px 24px rgba(12, 11, 12, 0.35));
    }

    .coffee-nav .active-button {
      right: 0;
      background: #151515;
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.08),
        0 10px 18px rgba(0, 0, 0, 0.24);
    }

    .coffee-nav .nav-main {
      background: #151515;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow:
        inset 0 1px 1px rgba(255, 255, 255, 0.08),
        inset 0 -1px 1px rgba(0, 0, 0, 0.45);
    }

    .coffee-nav .nav-tab {
      color: #dbdbdb;
    }

    .coffee-nav .nav-tab.is-selected {
      color: #ffffff;
      background: #3a3a3a;
    }

    .cart-badge {
      position: absolute;
      top: 2px;
      right: 3px;
      min-width: 19px;
      height: 19px;
      border-radius: 999px;
      background: #b65b3f;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: bold;
      line-height: 1;
    }
  </style>
</head>

            <span class="nav-tab">

            <span class="nav-tab">

  </main>

  <script>
    /*
      This JavaScript lets each bottom nav turn its own active button on or off.
      The animation itself is handled by the CSS class named "is-active".
    */

    var bottomNavs = document.querySelectorAll(".bottom-nav");

    for (var navIndex = 0; navIndex < bottomNavs.length; navIndex = navIndex + 1) {
      bottomNavs[navIndex].addEventListener("click", function () {
        var activeModeIsOn = this.classList.toggle("is-active");

        this.setAttribute("aria-pressed", activeModeIsOn);
      });
    }
  </script>
